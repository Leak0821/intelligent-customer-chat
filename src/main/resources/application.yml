spring:
  application:
    name: intelligent-customer-chat
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:${MYSQL_PORT:3306}/intelligent_customer_chat?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${SPRING_DATASOURCE_USERNAME:${MYSQL_USER:icc}}
    password: ${SPRING_DATASOURCE_PASSWORD:${MYSQL_PASSWORD:icc123456}}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_REDIS_HOST:127.0.0.1}
      port: ${SPRING_REDIS_PORT:6379}
      database: ${SPRING_REDIS_DATABASE:0}
      timeout: 3s
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:dummy-key-for-slice-1}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    banner: false

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  mail:
    enabled: ${APP_MAIL_ENABLED:false}
    source: ${APP_MAIL_SOURCE:imap}
    poll-size: ${APP_MAIL_POLL_SIZE:20}
    host: ${APP_MAIL_HOST:}
    port: ${APP_MAIL_PORT:993}
    username: ${APP_MAIL_USERNAME:}
    password: ${APP_MAIL_PASSWORD:}
    folder: ${APP_MAIL_FOLDER:INBOX}
    ssl-enabled: ${APP_MAIL_SSL_ENABLED:true}
    mark-seen-after-fetch: ${APP_MAIL_MARK_SEEN_AFTER_FETCH:false}
    polling-enabled: ${APP_MAIL_POLLING_ENABLED:false}
    poll-interval-millis: ${APP_MAIL_POLL_INTERVAL_MILLIS:60000}
    connection-timeout-millis: ${APP_MAIL_CONNECTION_TIMEOUT_MILLIS:5000}
    read-timeout-millis: ${APP_MAIL_READ_TIMEOUT_MILLIS:5000}
  workflow:
    auto-complete-empty-chain: true
  context:
    memory:
      enabled: ${APP_CONTEXT_MEMORY_ENABLED:false}
      recent-round-limit: ${APP_CONTEXT_RECENT_ROUND_LIMIT:5}
      summary-threshold: ${APP_CONTEXT_SUMMARY_THRESHOLD:10}
      redis-key-prefix: ${APP_CONTEXT_REDIS_KEY_PREFIX:icc:memory}
  knowledge:
    elasticsearch:
      enabled: ${APP_ELASTICSEARCH_ENABLED:false}
      uris: ${APP_ELASTICSEARCH_URIS:http://127.0.0.1:9200}
      index-name: ${APP_ELASTICSEARCH_INDEX_NAME:knowledge_chunks}
      title-field: ${APP_ELASTICSEARCH_TITLE_FIELD:title}
      content-field: ${APP_ELASTICSEARCH_CONTENT_FIELD:content}
      top-k: ${APP_ELASTICSEARCH_TOP_K:10}
