spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/intelligent_customer_chat?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USER:icc}
    password: ${MYSQL_PASSWORD:icc123456}
  data:
    redis:
      host: 127.0.0.1
      port: 6379
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:dummy-key-for-slice-1}

app:
  ai:
    chat:
      enabled: false
  mail:
    enabled: false
    polling-enabled: false
    outbound:
      enabled: false
  context:
    memory:
      enabled: true
      llm-summary-enabled: false
  knowledge:
    embedding:
      enabled: false
    elasticsearch:
      enabled: true
      uris: http://127.0.0.1:9200
  runtime-config:
    nacos:
      enabled: false
  scheduler:
    xxl:
      enabled: false
  runtime-preflight:
    enabled: true
